<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>High‑res Apple Music PiP</title>
  <style>
    body { font-family: Arial, sans-serif; padding:1rem; }
    video { width:640px; height:360px; border:1px solid #ccc; display:block; margin-top:1rem; object-fit:cover; }
    #status { margin-top:.5rem; color:#444; }
  </style>
</head>
<body>
  <button id="start">Open Apple Music popup and start high‑res PiP</button>
  <div id="status">Tip: choose the popup window in the screen selection dialog.</div>
  <video id="preview" autoplay muted playsinline></video>

  <script>
    const btn = document.getElementById('start');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
      status.textContent = 'Opening popup...';
      // Open a large popup to maximize capture resolution
      const popup = window.open('https://beta.music.apple.com', 'appleMusicPopup',
        'width=1920,height=1080,toolbar=no,menubar=no,location=no,status=no');

      // Give the popup a moment to open and render
      await new Promise(r => setTimeout(r, 700));

      // Request screen capture. User must select the popup window in the dialog.
      try {
        const constraints = {
          video: {
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            frameRate: { ideal: 30 }
          },
          audio: true
        };

        const stream = await navigator.mediaDevices.getDisplayMedia(constraints);
        preview.srcObject = stream;
        await preview.play();
        status.textContent = 'Preview active. Requesting Picture-in-Picture...';

        // Request PiP (browser decides final PiP size)
        if ('requestPictureInPicture' in HTMLVideoElement.prototype) {
          try {
            await preview.requestPictureInPicture();
            status.textContent = 'In Picture-in-Picture. Close PiP to stop capture.';
          } catch (err) {
            status.textContent = 'PiP request failed: ' + err.message;
          }
        } else {
          status.textContent = 'Browser does not support requestPictureInPicture.';
        }

        // Stop capture when PiP closed or when stream ends
        preview.addEventListener('leavepictureinpicture', () => {
          stream.getTracks().forEach(t => t.stop());
          status.textContent = 'PiP closed. Capture stopped.';
        }, { once: true });

      } catch (err) {
        status.textContent = 'Capture cancelled or blocked. Make sure to select the popup window.';
        console.error(err);
      }
    });
  </script>
</body>
</html>
